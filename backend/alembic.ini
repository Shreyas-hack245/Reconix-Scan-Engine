# Reconix Scan Engine - Alembic configuration.
#
# NOTE: The application itself does not require Alembic to run --
# app/db/session.py calls Base.metadata.create_all() automatically on
# startup, which is sufficient for local development and the default
# SQLite database. Alembic is provided here for teams that want proper,
# versioned migrations once the schema stabilizes or a production
# database (Postgres/MySQL) is introduced.
#
# To start using it:
#   cd backend
#   alembic revision --autogenerate -m "initial schema"
#   alembic upgrade head

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# sqlalchemy.url is intentionally left blank here; alembic/env.py reads
# the real database URL from app.config.settings so a single source of
# truth (.env) drives both the running app and migrations.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S